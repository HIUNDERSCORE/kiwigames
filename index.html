<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiwiWeb</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Kiwi<span>Web</span></div>
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">Apps</a></li>
            <li><a href="#">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Welcome to KiwiWeb</h1>
            <p>"have fun with aptiode :)"</p>
        </header>

        <section class="store-container">
            <div class="store-header">
                <h3>Aptoide App Store Integration</h3>
                <span class="status-badge">Secure Connection</span>
            </div>
            <div class="store-frame" id="store-display">
                <p class="loading-text">Loading secure store data...</p>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
